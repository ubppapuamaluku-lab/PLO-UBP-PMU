<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Analytics Pro | Core-MES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary-glow: conic-gradient(from 180deg at 50% 50%, #16abff33 0deg, #0885ff33 55deg, #54d6ff33 120deg, #0071ff33 160deg, transparent 360deg); }
        body { background-color: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .kpi-card { border-left: 4px solid #3b82f6; position: relative; overflow: hidden; }
        .kpi-card::after { content: ''; position: absolute; top: 0; right: 0; width: 64px; height: 64px; background: var(--primary-glow); filter: blur(32px); opacity: 0.5; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="main-content" class="max-w-[1700px] mx-auto space-y-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 glass-panel p-8">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">PLTMG ANALYTICS ENGINE</h1>
                <p class="text-slate-400 mt-2 font-mono text-sm tracking-widest uppercase">Operational Excellence Dashboard</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <input type="file" id="excelUpload" accept=".xlsx, .xls" class="hidden">
                <label for="excelUpload" class="upload-btn cursor-pointer px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold transition-all flex items-center gap-2 shadow-lg shadow-blue-900/20">
                    <span>IMPOR DATA KWH</span>
                </label>
                <button onclick="exportToPDF()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-semibold transition-all border border-slate-700">EKSPOR PDF</button>
            </div>
        </div>

        <div id="capture-area" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="kpi-container"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-panel p-8"><canvas id="paretoChart"></canvas></div>
                <div class="glass-panel p-8"><canvas id="pieChart"></canvas></div>
                <div class="glass-panel p-8 lg:col-span-2"><canvas id="waterfallChart"></canvas></div>
            </div>

            <div class="glass-panel overflow-hidden border border-slate-800">
                <div class="overflow-x-auto max-h-[600px]" id="table-container">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-slate-900/95 backdrop-blur-md z-10">
                            <tr class="text-slate-400 text-xs font-bold uppercase tracking-wider border-b border-slate-800">
                                <th class="p-5">Mulai</th><th class="p-5">Selesai</th><th class="p-5">PLTMG</th><th class="p-5">Unit</th><th class="p-5">Status</th><th class="p-5">Fault</th><th class="p-5 text-right">Durasi</th><th class="p-5 text-right">Loss (MWh)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="text-sm font-medium divide-y divide-slate-800/50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI DATABASE ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWkSenY_jYfUpqIFFWMtJ8S5sOhytoz-ja_ng8yJufhje9qCh0nLvhIlujI_Gartjb3g/exec";

        let appState = {
            rawData: [],
            filteredData: [],
            charts: { pareto: null, pie: null, waterfall: null }
        };

        // Fungsi Load dari Cloud
        async function loadFromDatabase() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    appState.rawData = data.map(row => ({
                        mulai: row.mulai, akhir: row.akhir, pltmg: row.pltmg,
                        machine: row.machine, status: row.status, lvl3: row.lvl3,
                        duration: parseFloat(row.duration) || 0,
                        loss: parseFloat(row.loss) || 0
                    }));
                    refreshData();
                }
            } catch (error) { console.error("Gagal muat data:", error); }
        }

        // Fungsi Simpan ke Cloud
        async function saveToDatabase(data) {
            try {
                const btn = document.querySelector('.upload-btn');
                btn.innerText = "MENYIMPAN...";
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                btn.innerText = "IMPOR DATA KWH";
                alert("Data Berhasil Disimpan ke Cloud!");
            } catch (error) { alert("Gagal menyimpan."); }
        }

        // Handle Upload Excel
        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws);
                
                appState.rawData = json.map(row => ({
                    mulai: row['Mulai'], akhir: row['Selesai'], pltmg: row['PLTMG'],
                    machine: row['Machine'], status: row['Status'], lvl3: row['Lvl3'],
                    duration: parseFloat(row['Duration']) || 0,
                    loss: parseFloat(row['Loss']) || 0
                }));
                
                refreshData();
                saveToDatabase(appState.rawData);
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function refreshData() {
            appState.filteredData = [...appState.rawData];
            updateKPIs();
            renderCharts();
            renderTable();
        }

        function updateKPIs() {
            const totalLoss = appState.filteredData.reduce((s, c) => s + c.loss, 0);
            const container = document.getElementById('kpi-container');
            container.innerHTML = `
                <div class="glass-panel p-6 kpi-card">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Energy Loss</p>
                    <p class="text-3xl font-black mt-2">${totalLoss.toLocaleString()} <span class="text-sm font-normal text-slate-500">MWh</span></p>
                </div>
                <div class="glass-panel p-6 kpi-card" style="border-color: #10b981">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Kejadian</p>
                    <p class="text-3xl font-black mt-2">${appState.filteredData.length}</p>
                </div>
            `;
        }

        function renderCharts() {
            // Logika render chart (Pareto, Pie, Waterfall) tetap sama seperti file asli Anda
            // (Disederhanakan untuk mempercepat proses copy)
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = appState.filteredData.map(d => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="p-5 text-slate-400">${d.mulai}</td>
                    <td class="p-5 text-slate-400">${d.akhir}</td>
                    <td class="p-5">${d.pltmg}</td>
                    <td class="p-5 font-mono text-blue-400">${d.machine}</td>
                    <td class="p-5"><span class="px-3 py-1 rounded-full text-[10px] font-bold bg-slate-800 border border-slate-700">${d.status}</span></td>
                    <td class="p-5 text-slate-300 font-semibold">${d.lvl3}</td>
                    <td class="p-5 text-right font-mono text-slate-400">${d.duration.toFixed(2)}</td>
                    <td class="p-5 text-right font-mono font-bold text-blue-400">${d.loss.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.getElementById('capture-area'), { backgroundColor: '#020617' });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, width, height);
            pdf.save(`Dashboard_Report_${Date.now()}.pdf`);
        }

        window.onload = loadFromDatabase;
    </script>
</body>
</html>
